<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Archelaos Chatzinikolaou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="toolbar no-print">
        <button id="print-btn" type="button">Download PDF</button>
        <span class="hint">Tip: Print → Save as PDF | More settings: disable Headers and footers</span>
      </div>

      <main class="cv">
        <header class="hero">
          <div class="hero-photo">
            <img id="photo" alt="" />
            <div class="photo-fallback" id="photo-fallback">
              Προσθήκη φωτογραφίας
            </div>
          </div>
          <div class="hero-text">
            <p class="eyebrow" id="title"></p>
            <h1 id="name"></h1>
            <p class="summary" id="summary"></p>
            <ul class="contact-list" id="contacts"></ul>
          </div>
        </header>

        <section class="grid">
          <div class="col">
            <section class="block" id="experience"></section>
            <section class="block" id="projects"></section>
          </div>
          <div class="col">
            <section class="block" id="skills"></section>
            <section class="block" id="education"></section>
            <section class="block" id="courses"></section>
            <section class="block" id="languages"></section>
            <section class="block" id="interests"></section>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
